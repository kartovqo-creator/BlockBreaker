name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libltdl-dev aidl
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Force Accept Android Licenses Everywhere
      run: |
        # Приемаме ги в глобалното SDK
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
        
        # Създаваме предварително папките на Buildozer и му копираме одобрените лицензи наготово
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_HOME/licenses/* /home/runner/.buildozer/android/platform/android-sdk/licenses/ || true

    - name: Build with Buildozer
      run: |
        cd BlockBreaker
        export ANDROID_HOME=$ANDROID_HOME
        ~/.local/bin/buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: BlockBreaker/bin/*.apk
