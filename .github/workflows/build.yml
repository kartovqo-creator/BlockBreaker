name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libltdl-dev
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Setup Android SDK & Install Aidl
      run: |
        # Инсталираме build-tools директно през вградения sdkmanager на GitHub машината
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;34.0.0"

    - name: Build with Buildozer
      run: |
        cd BlockBreaker
        # Подаваме пътя на Android SDK към Buildozer, за да не тегли нищо наново
        export ANDROID_HOME=$ANDROID_HOME
        ~/.local/bin/buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: BlockBreaker/bin/*.apk
